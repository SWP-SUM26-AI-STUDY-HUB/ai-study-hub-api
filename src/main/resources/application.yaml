server:
  port: 8080

spring:
  application:
    name: ai-study-hub-api
  profiles:
    active: @spring.profiles.active@

management:
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    root: INFO
    web: INFO

app:
  jwt:
    secret: ${JWT_SECRET:9a4f2c8d3e7b1a5c6d8e0f9b8c7a6d5e4f3c2b1a0d9e8f7a6b5c4d3e2f1a0b9c}
    access-expiration-ms: 900000     # 15 minutes = 15 * 60 * 1000 = 900000
    refresh-expiration-ms: 604800000 # 7 days = 7 * 24 * 60 * 60 * 1000 = 604800000

security:
  oauth2:
    client:
      registration:
        google:
          client-id: ${GOOGLE_CLIENT_ID}
          client-secret: ${GOOGLE_CLIENT_SECRET}
          redirect-uri: "${GOOGLE_REDIRECT_URI:http://localhost:4300/auth/google/callback}"
          user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
