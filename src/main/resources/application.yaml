server:
  port: 8080

spring:
  application:
    name: ai-study-hub-api
  profiles:
    active: @spring.profiles.active@
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "${GOOGLE_REDIRECT_URI:http://localhost:4300/auth/google/callback}"
            scope:
              - email
              - profile
        provider:
          google:
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/aistudyhub}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:your_password}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 60000


  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_ACCOUNT:mail_account}
    password: ${MAIL_PASSWORD:localhost}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    root: INFO
    web: INFO
    vn.ai_study_hub_api: DEBUG # Thêm dòng này để log ra các bước xử lý của bạn
aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET:ai-study-hub-bucket}
    region: ${AWS_REGION:ap-southeast-1}
    access-key: ${AWS_ACCESS_KEY_ID:mock_access_key}
    secret-key: ${AWS_SECRET_ACCESS_KEY:mock_secret_key}
    endpoint: ${AWS_S3_ENDPOINT:}

fastapi:
  rag-process-url: ${FASTAPI_RAG_PROCESS_URL:http://localhost:8000/api/v1/rag/process}

app:
  jwt:
    secret: ${JWT_SECRET:9a4f2c8d3e7b1a5c6d8e0f9b8c7a6d5e4f3c2b1a0d9e8f7a6b5c4d3e2f1a0b9c}
    access-expiration-ms: 900000
    refresh-expiration-ms: 604800000
  async:
    core-pool-size: 5
    max-pool-size: 20
    queue-capacity: 100
    thread-name-prefix: doc-async-