name: Deploy Spring Boot app to VPS

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            if [ ! -d "$HOME/ai-study-hub-api/.git" ]; then
              echo "directory not exist, clone code..."
              rm -rf ~/ai-study-hub-api
            fi
            
            mkdir -p ~/ai-study-hub-api
            cd ~/ai-study-hub-api

            if [ -d ".git" ]; then
              echo "directory exist, pull code..."
              git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
              git fetch --all
              git reset --hard origin/dev
            else
              echo "directory not exist, clone code..."
              git clone -b dev https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
            fi

            echo "DATABASE_USERNAME=${{ secrets.DATABASE_USERNAME }}" > .env
            echo "DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}" >> .env
            
            if [ ! -f "initdb.sql" ]; then
              touch initdb.sql
            fi

            echo "Đang khởi động lại Docker containers..."
            docker compose down
            docker compose up --build -d